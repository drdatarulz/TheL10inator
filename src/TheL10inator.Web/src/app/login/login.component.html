<div class="login-page">
  <div class="login-card">
    <h1 class="login-title">TheL10inator</h1>
    <p class="login-subtitle">Sign in to run your EOS Level 10 meeting.</p>

    @if (errorBanner()) {
      <div class="alert alert-danger" role="alert">{{ errorBanner() }}</div>
    }

    @if (useDevBypass) {
      <form (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            required
            class="form-control"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            autocomplete="email"
          />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="submitting()">
          Sign in
        </button>
        <p class="form-text mt-3">Dev bypass is active — use an invited team member's email.</p>
      </form>
    } @else {
      <button type="button" class="btn btn-primary w-100" (click)="onSubmit()" [disabled]="submitting()">
        Sign in with Microsoft
      </button>
    }
  </div>
</div>
